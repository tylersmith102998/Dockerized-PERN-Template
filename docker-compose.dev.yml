services:
    nginx:
        build:
            context: .
            dockerfile: ./nginx/Dockerfile.dev
        ports:
            - "80:80"
        depends_on:
            - web
            - api

    web:
        build:
            context: .
            dockerfile: ./apps/web/Dockerfile.dev
        ports:
            - "5173:5173"
        depends_on:
            - api
        develop:
            watch:
                - action: sync
                  path: ./apps/web
                  target: /repo/apps/web
                - action: sync
                  path: ./packages/shared
                  target: /repo/packages/shared
                - action: rebuild
                  path: ./apps/web/package.json
                - action: rebuild
                  path: ./packages/shared/package.json
                - action: rebuild
                  path: ./package.json
                - action: rebuild
                  path: ./package-lock.json

    api:
        build:
            context: .
            dockerfile: ./apps/api/Dockerfile.dev
        ports:
            - "3000:3000"
        environment:
            - DATABASE_URL=${DATABASE_URL}
        depends_on:
            db:
                condition: service_healthy

        develop:
            watch:
                - action: sync
                  path: ./apps/api
                  target: /repo/apps/api
                - action: sync
                  path: ./packages/shared
                  target: /repo/packages/shared
                - action: rebuild
                  path: ./apps/api/package.json
                - action: rebuild
                  path: ./packages/shared/package.json
                - action: rebuild
                  path: ./package.json
                - action: rebuild
                  path: ./package-lock.json
                - action: rebuild
                  path: ./apps/api/prisma/migrations

    db:
        image: postgres:18
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: app_db
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
            interval: 5s
            timeout: 2s
            retries: 20

volumes:
    db_data:
